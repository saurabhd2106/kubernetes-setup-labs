---
# GCP Cloud Controller Manager — render gce.conf, apply CCM RBAC + DaemonSet.
# Requires enable_gcp_cloud_controller and populated gcp_* variables in group_vars.

- name: "Validate GCP CCM variables"
  ansible.builtin.assert:
    that:
      - gcp_project_id | length > 0
      - gcp_network_name | length > 0
      - gcp_subnetwork_name | length > 0
      - gcp_zone | length > 0
      - gcp_node_ssh_tag | length > 0
    fail_msg: >-
      When enable_gcp_cloud_controller is true, set gcp_project_id, gcp_network_name,
      gcp_subnetwork_name, gcp_zone, and gcp_node_ssh_tag (match deploy-vm-google outputs).

- name: "Install GCE cloud config for CCM"
  ansible.builtin.template:
    src: gce.conf.j2
    dest: /etc/kubernetes/gce.conf
    owner: root
    group: root
    mode: "0600"

- name: "Render CCM manifest on the control plane node"
  ansible.builtin.template:
    src: cloud-controller-manager.yaml.j2
    dest: /root/gcp-ccm-manifest.yaml
    owner: root
    group: root
    mode: "0600"

- name: "Apply GCP Cloud Controller Manager"
  ansible.builtin.command: >-
    kubectl --kubeconfig /etc/kubernetes/admin.conf apply -f /root/gcp-ccm-manifest.yaml
  register: gcp_ccm_apply
  changed_when: "'configured' in gcp_ccm_apply.stdout or 'created' in gcp_ccm_apply.stdout"

- name: "Wait for cloud-controller-manager DaemonSet rollout"
  ansible.builtin.command: >-
    kubectl --kubeconfig /etc/kubernetes/admin.conf -n kube-system
    rollout status daemonset/cloud-controller-manager --timeout=300s
  changed_when: false
