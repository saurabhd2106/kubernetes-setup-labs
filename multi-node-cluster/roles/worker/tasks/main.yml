---
# =====================================================================
# roles/worker - Join this node to the cluster as a worker.
#
# Idempotent: if /etc/kubernetes/kubelet.conf already exists, the node
# has already been joined and we skip the kubeadm join step entirely.
# =====================================================================

- name: "Has this worker already been joined? (look for kubelet.conf)"
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: "Pin kubelet's --node-ip to the VPC internal IP"
  ansible.builtin.copy:
    dest: /etc/default/kubelet
    owner: root
    group: root
    mode: '0644'
    content: |
      KUBELET_EXTRA_ARGS=--node-ip={{ ansible_host }}
  when: not kubelet_conf.stat.exists

- name: "Pull the master's join command into a local fact"
  ansible.builtin.set_fact:
    join_command_from_master: "{{ hostvars[groups['masters'][0]].kubeadm_join_command }}"
  when:
    - not kubelet_conf.stat.exists
    - hostvars[groups['masters'][0]].kubeadm_join_command is defined

- name: "Refuse to continue if no join command was registered"
  ansible.builtin.assert:
    that:
      - join_command_from_master is defined
      - join_command_from_master | length > 0
    fail_msg: >-
      The control_plane role did not register `kubeadm_join_command`.
      Did Play 2 (the control-plane play) run successfully? You can
      generate a join command manually on the master with:
        sudo kubeadm token create --print-join-command
  when: not kubelet_conf.stat.exists

- name: "Join the cluster as a worker"
  ansible.builtin.command: >-
    {{ join_command_from_master }}
    --node-name {{ inventory_hostname }}
  when: not kubelet_conf.stat.exists
  register: kubeadm_join
  changed_when: true

- name: "Show kubeadm join output (truncated)"
  ansible.builtin.debug:
    msg: "{{ kubeadm_join.stdout_lines[-10:] | default([]) }}"
  when:
    - kubeadm_join is defined
    - kubeadm_join.stdout is defined
