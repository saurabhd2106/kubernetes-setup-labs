---
# =====================================================================
# roles/control_plane - Bootstrap the master:
#   1. Render the declarative kubeadm config file.
#   2. Pre-pull control-plane images (idempotent).
#   3. Run `kubeadm init` only if the cluster isn't already up.
#   4. Install the kubeconfig for root and the SSH user.
#   5. Apply the Calico CNI manifest.
#   6. Generate a fresh `kubeadm join` command and stash it as a fact
#      so the workers play can read it via hostvars.
#   7. Fetch /etc/kubernetes/admin.conf back to the controller machine.
# =====================================================================

- name: "Has this node already been initialised? (look for admin.conf)"
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: admin_conf

- name: "Read existing apiserver endpoint from admin.conf (if present)"
  ansible.builtin.shell: |
    set -o pipefail
    awk '/^[[:space:]]*server:[[:space:]]*https:\/\// {print $2; exit}' /etc/kubernetes/admin.conf
  args:
    executable: /bin/bash
  register: existing_admin_conf_server
  changed_when: false
  when: admin_conf.stat.exists

- name: "Fail fast when existing admin.conf endpoint differs from inventory"
  ansible.builtin.assert:
    that:
      - existing_admin_conf_server.stdout | trim == ('https://' ~ control_plane_endpoint)
    fail_msg: >-
      Existing /etc/kubernetes/admin.conf points to {{
      existing_admin_conf_server.stdout | trim | default('unknown') }}, but this
      inventory expects https://{{ control_plane_endpoint }}.
      This usually means the control plane was previously bootstrapped with a
      different master IP. Rebuild the cluster state with:
        ansible-playbook reset.yml
      Then run:
        ansible-playbook site.yml
  when: admin_conf.stat.exists

- name: "Render kubeadm config"
  ansible.builtin.template:
    src: kubeadm-config.yaml.j2
    dest: /etc/kubernetes/kubeadm-config.yaml
    owner: root
    group: root
    mode: '0600'

- name: "Pre-pull control-plane images"
  ansible.builtin.command: kubeadm config images pull --config /etc/kubernetes/kubeadm-config.yaml
  when: not admin_conf.stat.exists
  changed_when: true

- name: "kubeadm init (this can take 1-2 minutes)"
  ansible.builtin.command: kubeadm init --config /etc/kubernetes/kubeadm-config.yaml --upload-certs
  when: not admin_conf.stat.exists
  register: kubeadm_init
  changed_when: true

- name: "Show kubeadm init output (truncated)"
  ansible.builtin.debug:
    msg: "{{ kubeadm_init.stdout_lines[-15:] | default([]) }}"
  when: kubeadm_init is defined and kubeadm_init.stdout is defined

# ---------------------------------------------------------------------
# kubeconfig for root and the SSH user
# ---------------------------------------------------------------------
- name: "Ensure /root/.kube exists"
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: "Install /root/.kube/config"
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    owner: root
    group: root
    mode: '0600'

- name: "Look up the SSH user's home directory"
  ansible.builtin.getent:
    database: passwd
    key: "{{ ansible_user | default('ubuntu') }}"
  when: (ansible_user | default('ubuntu')) != 'root'

- name: "Resolve the SSH user's home directory"
  ansible.builtin.set_fact:
    ssh_user_home: "{{ getent_passwd[ansible_user | default('ubuntu')][4] }}"
  when:
    - (ansible_user | default('ubuntu')) != 'root'
    - getent_passwd is defined
    - getent_passwd[ansible_user | default('ubuntu')] is defined

- name: "Ensure ~/.kube exists for the SSH user"
  ansible.builtin.file:
    path: "{{ ssh_user_home }}/.kube"
    state: directory
    owner: "{{ ansible_user | default('ubuntu') }}"
    group: "{{ ansible_user | default('ubuntu') }}"
    mode: '0700'
  when: ssh_user_home is defined

- name: "Install kubeconfig for the SSH user"
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{ ssh_user_home }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user | default('ubuntu') }}"
    group: "{{ ansible_user | default('ubuntu') }}"
    mode: '0600'
  when: ssh_user_home is defined

# ---------------------------------------------------------------------
# CNI: Calico
# ---------------------------------------------------------------------
- name: "Wait for the apiserver to accept requests"
  ansible.builtin.command: >-
    kubectl --kubeconfig /etc/kubernetes/admin.conf get --raw=/healthz
  register: apiserver_healthz
  retries: 30
  delay: 5
  until: apiserver_healthz.rc == 0
  changed_when: false

- name: "Check whether the calico-node DaemonSet exists"
  ansible.builtin.command: >-
    kubectl --kubeconfig /etc/kubernetes/admin.conf
    -n kube-system get ds calico-node
  register: calico_check
  failed_when: false
  changed_when: false

- name: "Apply the Calico manifest"
  ansible.builtin.command: >-
    kubectl --kubeconfig /etc/kubernetes/admin.conf
    apply -f {{ calico_manifest_url }}
  when: calico_check.rc != 0
  changed_when: true

# ---------------------------------------------------------------------
# Generate a fresh join command and expose it to the workers play
# ---------------------------------------------------------------------
- name: "Generate a fresh kubeadm join command (24h TTL)"
  ansible.builtin.command: kubeadm token create --print-join-command --ttl 24h
  register: join_cmd
  changed_when: false

- name: "Register the join command as a host fact for the workers play"
  ansible.builtin.set_fact:
    kubeadm_join_command: "{{ join_cmd.stdout | trim }}"

- name: "Parse kubeadm join command for GCP structured join config"
  ansible.builtin.set_fact:
    kubeadm_join_api_server: "{{ (join_cmd.stdout | trim).split()[2] }}"
    kubeadm_join_token: "{{ (join_cmd.stdout | trim).split()[4] }}"
    kubeadm_join_ca_hash: "{{ (join_cmd.stdout | trim).split()[6] }}"
  when: enable_gcp_cloud_controller | default(false) | bool

- name: "Validate parsed kubeadm join fields (GCP CCM)"
  ansible.builtin.assert:
    that:
      - kubeadm_join_api_server is defined
      - kubeadm_join_token is defined
      - kubeadm_join_ca_hash is defined
      - kubeadm_join_ca_hash is match('^sha256:[a-f0-9]+$')
    fail_msg: >-
      Could not parse kubeadm token create output.
      Expected: kubeadm join <host:6443> --token ... --discovery-token-ca-cert-hash sha256:...
  when: enable_gcp_cloud_controller | default(false) | bool

# ---------------------------------------------------------------------
# Fetch admin.conf to the controller so the operator can use kubectl
# from outside the cluster.
# ---------------------------------------------------------------------
- name: "Ensure local artifacts directory exists"
  ansible.builtin.file:
    path: "{{ local_artifacts_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: false
  run_once: true

- name: "Fetch admin.conf to the controller"
  ansible.builtin.fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ local_artifacts_dir }}/admin.conf"
    flat: true

- name: "Rewrite server URL in fetched kubeconfig to use the master's external/internal IP"
  ansible.builtin.replace:
    path: "{{ local_artifacts_dir }}/admin.conf"
    regexp: 'server: https://[^:]+:6443'
    replace: "server: https://{{ ansible_ssh_host | default(ansible_host) }}:6443"
  delegate_to: localhost
  become: false
  run_once: true
