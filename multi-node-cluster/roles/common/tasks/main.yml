---
# =====================================================================
# roles/common - Make every node ready to run kubelet:
#   - install minimum apt prerequisites
#   - permanently disable swap
#   - load required kernel modules (overlay, br_netfilter)
#   - apply Kubernetes-required sysctl settings
# =====================================================================

- name: "Refuse to run on non-Ubuntu hosts"
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Ubuntu"
    fail_msg: >-
      This playbook only supports Ubuntu (target: 24.04). Detected:
      {{ ansible_distribution }} {{ ansible_distribution_version }}.

- name: "Warn on Ubuntu releases other than 24.04"
  ansible.builtin.debug:
    msg: >-
      WARNING: tested on Ubuntu 24.04, this host is
      Ubuntu {{ ansible_distribution_version }}. Continuing.
  when: ansible_distribution_version is version('24.04', '!=')

- name: "Install apt prerequisites"
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg
      - software-properties-common
    state: present
    update_cache: true
    cache_valid_time: 600

# ---------------------------------------------------------------------
# Swap off (kubelet refuses to run with swap enabled)
# ---------------------------------------------------------------------
- name: "Check whether any swap is currently active"
  ansible.builtin.command: swapon --noheadings --show=NAME
  register: active_swap
  changed_when: false
  check_mode: false

- name: "Disable all active swap"
  ansible.builtin.command: swapoff -a
  when: active_swap.stdout | length > 0
  changed_when: true

- name: "Comment out swap entries in /etc/fstab so they don't return"
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(\s*[^#\s].*\s+swap\s+.*)$'
    replace: '# \1'

- name: "Remove default Ubuntu cloud-image swapfile if present"
  ansible.builtin.file:
    path: /swap.img
    state: absent

# ---------------------------------------------------------------------
# Kernel modules required by containerd + the kube networking stack
# ---------------------------------------------------------------------
- name: "Load required kernel modules now"
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: "Make required kernel modules load on every boot"
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      overlay
      br_netfilter

# ---------------------------------------------------------------------
# Required sysctl tunables
# ---------------------------------------------------------------------
- name: "Drop Kubernetes sysctl settings"
  ansible.builtin.copy:
    dest: /etc/sysctl.d/k8s.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
  notify: "Reload sysctl"

- name: "Apply sysctl settings immediately (in case the handler doesn't run)"
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: true
    reload: true
  loop:
    - { name: "net.bridge.bridge-nf-call-iptables",  value: "1" }
    - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { name: "net.ipv4.ip_forward",                 value: "1" }
